review_triggers:
  - name: core_engine_change
    type: changed_paths
    paths:
      - entrix/cli.py
      - entrix/engine.py
      - entrix/governance.py
      - entrix/review_trigger.py
      - entrix/presets/**
    severity: high
    action: require_human_review

  - name: packaging_or_workflow_change
    type: changed_paths
    paths:
      - pyproject.toml
      - .github/workflows/**
      - docs/fitness/**
    severity: medium
    action: require_human_review

  - name: sensitive_release_files
    type: sensitive_file_change
    paths:
      - pyproject.toml
      - entrix/model.py
      - entrix/review_trigger.py
    severity: high
    action: require_human_review

  - name: cross_boundary_engine_test_docs_change
    type: cross_boundary_change
    boundaries:
      engine:
        - entrix/**
      tests:
        - tests/**
      docs:
        - docs/**
    min_boundaries: 2
    severity: medium
    action: require_human_review

  - name: oversized_change
    type: diff_size
    max_files: 10
    max_added_lines: 400
    max_deleted_lines: 250
    severity: medium
    action: require_human_review

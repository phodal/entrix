  <text x="380" y="320" font-family="sans-serif" font-size="12" fill="#475569">• lint, policy</text>
  <text x="380" y="338" font-family="sans-serif" font-size="12" fill="#475569">• unit tests</text>
  <text x="380" y="356" font-family="sans-serif" font-size="12" fill="#475569">• file budget</text>


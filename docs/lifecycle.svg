  <text x="52" y="338" font-family="sans-serif" font-size="12" fill="#475569">• evidence type</text>
  <text x="52" y="356" font-family="sans-serif" font-size="12" fill="#475569">• run_when_changed</text>

  <rect x="368" y="280" width="280" height="100" rx="8" fill="#fff" stroke="#cbd5e1"/>

<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/><stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
    <linearGradient id="costBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="35%" stop-color="#facc15"/>
      <stop offset="65%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="sg1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="sg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <linearGradient id="sg3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffbeb"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
    <linearGradient id="sg4" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fdf2f8"/><stop offset="1" stop-color="#fce7f3"/></linearGradient>
    <linearGradient id="sg5" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f5f3ff"/><stop offset="1" stop-color="#ede9fe"/></linearGradient>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="jg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#f1f5f9"/></linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fefce8"/><stop offset="1" stop-color="#fde68a"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.07"/></filter>
    <filter id="ss" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.05"/></filter>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" stroke="#526071" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M1 1L5 9L9 1" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .t{font:700 28px ui-sans-serif,-apple-system,sans-serif;fill:#172033}
      .st{font:500 13px ui-sans-serif,-apple-system,sans-serif;fill:#526071}
      .sl{font:700 14px ui-sans-serif,-apple-system,sans-serif;fill:#172033}
      .sn{font:700 11px ui-sans-serif,-apple-system,sans-serif;fill:#FFF;letter-spacing:.05em}
      .dt{font:500 12px ui-sans-serif,-apple-system,sans-serif;fill:#334155}
      .se{font:700 16px ui-sans-serif,-apple-system,sans-serif;fill:#172033}
      .bd{font:500 13px ui-sans-serif,-apple-system,sans-serif;fill:#334155}
      .sm{font:500 11.5px ui-sans-serif,-apple-system,sans-serif;fill:#526071}
      .cl{font:600 10.5px ui-sans-serif,-apple-system,sans-serif;letter-spacing:.04em}
      .jp{font:700 10px ui-sans-serif,-apple-system,sans-serif;fill:#FFF;letter-spacing:.04em}
      .jb{font:500 12px ui-sans-serif,-apple-system,sans-serif;fill:#475569}
    </style>
  </defs>

  <rect width="1440" height="980" rx="28" fill="url(#bg)"/>

  <text x="60" y="58" class="t">Entrix Lifecycle</text>
  <text x="60" y="80" class="st">Anti-entropy guardrails: machine auto-blocks · machine assists · human must intervene</text>

  <rect x="60" y="98" width="1340" height="7" rx="3.5" fill="url(#costBar)" opacity="0.65"/>
  <text x="60" y="119" class="cl" style="fill:#16a34a">LOW FIX COST · HIGH CERTAINTY · AUTO-BLOCK</text>
  <text x="1400" y="119" class="cl" style="fill:#dc2626;text-anchor:end">HIGH FIX COST · HIGH SEMANTIC DENSITY · HUMAN JUDGMENT</text>


  <!-- ══════ 5 STAGES ══════ -->

  <!-- 1 Policy Setup -->
  <rect x="60" y="138" width="240" height="94" rx="18" fill="url(#sg1)" stroke="#93c5fd" filter="url(#sh)"/>
  <circle cx="82" cy="160" r="11" fill="#3b82f6"/><text x="78" y="164" class="sn">1</text>
  <text x="100" y="165" class="sl">Policy Setup</text>
  <text x="78" y="188" class="dt">Define how this change must</text>
  <text x="78" y="204" class="dt">be proven safe before merge</text>

  <path d="M300 185H328" stroke="#526071" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- 2 Quality Gates -->
  <rect x="340" y="138" width="240" height="94" rx="18" fill="url(#sg2)" stroke="#86efac" filter="url(#sh)"/>
  <circle cx="362" cy="160" r="11" fill="#22c55e"/><text x="358" y="164" class="sn">2</text>
  <text x="380" y="165" class="sl">Quality Gates</text>
  <text x="358" y="188" class="dt">Fast automated checks:</text>
  <text x="358" y="204" class="dt">compile, lint, test, coverage</text>

  <path d="M580 185H608" stroke="#526071" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- 3 Risk Routing -->
  <rect x="620" y="138" width="240" height="94" rx="18" fill="url(#sg3)" stroke="#fcd34d" filter="url(#sh)"/>
  <circle cx="642" cy="160" r="11" fill="#f59e0b"/><text x="638" y="164" class="sn">3</text>
  <text x="660" y="165" class="sl">Risk Routing</text>
  <text x="638" y="188" class="dt">Diff size, high-risk paths,</text>
  <text x="638" y="204" class="dt">graph impact, review triggers</text>

  <path d="M860 185H888" stroke="#526071" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- 4 Deep Validation -->
  <rect x="900" y="138" width="240" height="94" rx="18" fill="url(#sg4)" stroke="#f9a8d4" filter="url(#sh)"/>
  <circle cx="922" cy="160" r="11" fill="#ec4899"/><text x="918" y="164" class="sn">4</text>
  <text x="940" y="165" class="sl">Deep Validation</text>
  <text x="918" y="188" class="dt">API parity, E2E, visual,</text>
  <text x="918" y="204" class="dt">security scan, perf smoke</text>

  <path d="M1140 185H1168" stroke="#526071" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- 5 Decision Loop -->
  <rect x="1180" y="138" width="220" height="94" rx="18" fill="url(#sg5)" stroke="#c4b5fd" filter="url(#sh)"/>
  <circle cx="1202" cy="160" r="11" fill="#8b5cf6"/><text x="1197" y="164" class="sn">5</text>
  <text x="1220" y="165" class="sl">Decision Loop</text>
  <text x="1198" y="188" class="dt">Hard gates + score model,</text>
  <text x="1198" y="204" class="dt">incidents feed back as rules</text>


  <!-- ══════ DETAIL CARDS ══════ -->

  <!-- dashed connectors -->
  <path d="M180 232V266" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ad)"/>
  <path d="M460 232V266" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ad)"/>
  <path d="M740 232V266" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ad)"/>
  <path d="M1020 232V266" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ad)"/>
  <path d="M1290 232V266" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ad)"/>

  <!-- 1 details -->
  <rect x="60" y="278" width="240" height="120" rx="14" fill="url(#dg)" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="80" y="302" class="dt">● metrics &amp; thresholds</text>
  <text x="80" y="322" class="dt">● hard gates vs soft gates</text>
  <text x="80" y="342" class="dt">● evidence types</text>
  <text x="80" y="362" class="dt">● execution scope &amp; tier</text>
  <text x="80" y="382" class="dt">● run_when_changed</text>

  <!-- 2 details -->
  <rect x="340" y="278" width="240" height="120" rx="14" fill="url(#dg)" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="360" y="302" class="dt">● compile &amp; type check</text>
  <text x="360" y="322" class="dt">● lint (ESLint, Clippy)</text>
  <text x="360" y="342" class="dt">● unit tests</text>
  <text x="360" y="362" class="dt">● coverage baseline</text>
  <text x="360" y="382" class="dt">● file budget enforcement</text>

  <!-- 3 details -->
  <rect x="620" y="278" width="240" height="120" rx="14" fill="url(#dg)" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="640" y="302" class="dt">● API &amp; schema drift</text>
  <text x="640" y="322" class="dt">● blast radius (graph)</text>
  <text x="640" y="342" class="dt">● suspicious expansion</text>
  <text x="640" y="362" class="dt">● missing evidence</text>
  <text x="640" y="382" class="dt">● review-trigger rules</text>

  <!-- 4 details -->
  <rect x="900" y="278" width="240" height="120" rx="14" fill="url(#dg)" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="920" y="302" class="dt">● API parity &amp; contract</text>
  <text x="920" y="322" class="dt">● E2E &amp; visual regression</text>
  <text x="920" y="342" class="dt">● semgrep &amp; security audit</text>
  <text x="920" y="362" class="dt">● accessibility checks</text>
  <text x="920" y="382" class="dt">● performance smoke</text>

  <!-- 5 details -->
  <rect x="1180" y="278" width="220" height="120" rx="14" fill="url(#dg)" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="1200" y="302" class="dt">● hard gate + score model</text>
  <text x="1200" y="322" class="dt">● PASS / WARN / BLOCK</text>
  <text x="1200" y="342" class="dt">● incident write-back</text>
  <text x="1200" y="362" class="dt">● threshold tuning</text>
  <text x="1200" y="382" class="dt">● evidence ledger update</text>


  <!-- ══════ JUDGMENT STRUCTURE ══════ -->

  <rect x="60" y="440" width="1340" height="130" rx="22" fill="url(#jg)" stroke="#cbd5e1" filter="url(#sh)"/>
  <text x="86" y="474" class="se">Judgment Structure — Who Decides?</text>
  <text x="86" y="494" class="sm">Mature human-machine collaboration puts human judgment where it costs the most to get wrong</text>

  <!-- Machine auto-blocks -->
  <rect x="86" y="510" width="360" height="44" rx="12" fill="#f0fdf4" stroke="#86efac" filter="url(#ss)"/>
  <rect x="96" y="520" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="118" y="532" class="dt" style="font-weight:700;fill:#15803d">Machine auto-blocks</text>
  <text x="96" y="546" class="sm">compile, lint, hard gates, type check, file budget</text>

  <!-- Machine assists + flags -->
  <rect x="476" y="510" width="400" height="44" rx="12" fill="#fffbeb" stroke="#fcd34d" filter="url(#ss)"/>
  <rect x="486" y="520" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="508" y="532" class="dt" style="font-weight:700;fill:#b45309">Machine assists &amp; flags</text>
  <text x="486" y="546" class="sm">risk routing, graph impact, review triggers, score model</text>

  <!-- Human must intervene -->
  <rect x="906" y="510" width="480" height="44" rx="12" fill="#fef2f2" stroke="#fca5a5" filter="url(#ss)"/>
  <rect x="916" y="520" width="14" height="14" rx="3" fill="#ef4444"/>
  <text x="938" y="532" class="dt" style="font-weight:700;fill:#b91c1c">Human must intervene</text>
  <text x="916" y="546" class="sm">high-risk directory, contract-sensitive area, semantic ambiguity, deep validation</text>


  <!-- ══════ SYSTEM FOUNDATION ══════ -->

  <rect x="60" y="600" width="1340" height="100" rx="22" fill="url(#fg)" stroke="#f59e0b" filter="url(#sh)"/>
  <text x="86" y="634" class="se">System Foundation</text>

  <rect x="100" y="650" width="220" height="36" rx="10" fill="#FFFFFF" stroke="#fcd34d"/>
  <text x="140" y="673" class="bd">docs/fitness/*.md</text>

  <path d="M320 668H368" stroke="#526071" stroke-width="2.5" marker-end="url(#ar)"/>

  <rect x="380" y="650" width="260" height="36" rx="10" fill="#FFFFFF" stroke="#fcd34d"/>
  <text x="420" y="673" class="bd">entrix orchestration</text>

  <path d="M640 668H688" stroke="#526071" stroke-width="2.5" marker-end="url(#ar)"/>

  <rect x="700" y="650" width="380" height="36" rx="10" fill="#FFFFFF" stroke="#fcd34d"/>
  <text x="720" y="673" class="bd">hard gates + weighted score + review triggers</text>

  <!-- ══════ WHAT ENTRIX CODIFIES ══════ -->

  <rect x="60" y="730" width="1340" height="100" rx="22" fill="url(#jg)" stroke="#cbd5e1" filter="url(#sh)"/>
  <text x="86" y="764" class="se">What Gets Codified Into the Repository</text>

  <rect x="100" y="780" width="300" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="120" y="803" class="bd">Rules in repo (docs/fitness)</text>

  <path d="M400 798H438" stroke="#526071" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="450" y="780" width="340" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="470" y="803" class="bd">Evidence in repo (VERIFIED / TODO / BLOCKED)</text>

  <path d="M790 798H828" stroke="#526071" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="840" y="780" width="380" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="860" y="803" class="bd">Interpretation in executor (tier, scope, review-trigger)</text>

  <!-- ══════ FEEDBACK LOOP ══════ -->

  <rect x="60" y="860" width="1340" height="100" rx="22" fill="url(#jg)" stroke="#cbd5e1" filter="url(#sh)"/>
  <text x="86" y="894" class="se">Feedback Loop</text>
  <text x="240" y="894" class="sm">— production issues and missed detections feed back into the rule system</text>

  <rect x="100" y="910" width="260" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="120" y="933" class="bd">incident / missed detection</text>

  <path d="M360 928H398" stroke="#526071" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="410" y="910" width="240" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="430" y="933" class="bd">update docs/fitness rules</text>

  <path d="M650 928H688" stroke="#526071" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="700" y="910" width="200" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="720" y="933" class="bd">refine thresholds</text>

  <path d="M900 928H938" stroke="#526071" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="950" y="910" width="320" height="36" rx="10" fill="#FFFFFF" stroke="#e2e8f0" filter="url(#ss)"/>
  <text x="970" y="933" class="bd">add stronger verification templates</text>

</svg>

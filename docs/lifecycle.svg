  <text x="746" y="204" font-family="sans-serif" font-size="16" font-weight="700" fill="#1e293b">Risk Routing</text>
  <text x="714" y="226" font-family="sans-serif" font-size="13" fill="#475569">Measure risk via diff,</text>

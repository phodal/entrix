  <text x="708" y="302" font-family="sans-serif" font-size="12" fill="#475569">• API/schema drift</text>
  <text x="708" y="320" font-family="sans-serif" font-size="12" fill="#475569">• blast radius</text>
  <text x="708" y="338" font-family="sans-serif" font-size="12" fill="#475569">• missing evidence</text>
  <text x="708" y="356" font-family="sans-serif" font-size="12" fill="#475569">• review triggers</text>

  <rect x="1024" y="280" width="280" height="100" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="1036" y="302" font-family="sans-serif" font-size="12" fill="#475569">• API contract</text>
  <text x="1036" y="320" font-family="sans-serif" font-size="12" fill="#475569">• E2E tests</text>
  <text x="1036" y="338" font-family="sans-serif" font-size="12" fill="#475569">• security scan</text>
  <text x="1036" y="356" font-family="sans-serif" font-size="12" fill="#475569">• performance</text>

  <rect x="1352" y="280" width="208" height="100" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="1364" y="302" font-family="sans-serif" font-size="12" fill="#475569">• PASS/WARN/BLOCK</text>
  <text x="1364" y="320" font-family="sans-serif" font-size="12" fill="#475569">• weighted score</text>
  <text x="1364" y="338" font-family="sans-serif" font-size="12" fill="#475569">• tune thresholds</text>
  <text x="1364" y="356" font-family="sans-serif" font-size="12" fill="#475569">• stronger checks</text>


  <text x="58" y="226" font-family="sans-serif" font-size="13" fill="#475569">Define what must be proven</text>
  <text x="58" y="245" font-family="sans-serif" font-size="13" fill="#475569">safe before merge.</text>

  <!-- Arrow -->
  <path d="M320 215 H358" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>


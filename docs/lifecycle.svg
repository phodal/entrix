  <text x="392" y="204" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">2</text>
  <text x="418" y="204" font-family="sans-serif" font-size="16" font-weight="700" fill="#1e293b">Quality Gates</text>
  <text x="386" y="226" font-family="sans-serif" font-size="13" fill="#475569">Fast checks: compile, lint,</text>
